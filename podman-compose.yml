# Podman Compose file for HCP Terraform Cost Estimation Run Task
# Compatible with podman-compose command
# Usage: podman-compose up -d

version: '3.8'

services:
  # PostgreSQL database for c3x pricing API
  postgres:
    image: docker.io/library/postgres:15-alpine
    environment:
      POSTGRES_DB: c3x_pricing
      POSTGRES_USER: c3x
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data:Z
    # healthcheck:
    #   test: ["CMD-SHELL", "pg_isready -U c3x"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    networks:
      - c3x-network
    restart: unless-stopped

  # C3X Pricing API
  c3x-pricing-api:
    image: docker.io/c3xdev/c3x-pricing-api:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://c3x:${POSTGRES_PASSWORD:-changeme}@postgres:5432/c3x_pricing?sslmode=disable
      PORT: 4000
      API_KEY: ${C3X_API_KEY:-}
      GCP_API_KEY: ${GCP_API_KEY:-}
      SCRAPE_CONCURRENCY: 4
      RATE_LIMIT_PER_SEC: 100
      CORS_ALLOWED_ORIGINS: "*"
    ports:
      - "4000:4000"
    command: serve
    # healthcheck:
    #   test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:4000/healthz"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 10s
    networks:
      - c3x-network
    restart: unless-stopped

  # C3X Pricing API Scraper (runs periodically)
  c3x-scraper:
    image: docker.io/c3xdev/c3x-pricing-api:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://c3x:${POSTGRES_PASSWORD:-changeme}@postgres:5432/c3x_pricing?sslmode=disable
      GCP_API_KEY: ${GCP_API_KEY:-}
      SCRAPE_CONCURRENCY: 4
    command: >
      sh -c "
        echo 'Waiting for API to be ready...';
        sleep 30;
        echo 'Running initial scrape for all vendors...';
        c3x-pricing-api scrape --vendor all;
        echo 'Initial scrape complete. Scraper will run daily via cron or manual trigger.';
        tail -f /dev/null
      "
    networks:
      - c3x-network
    restart: unless-stopped

  # HCP Terraform Cost Estimation Run Task
  cost-estimation-run-task:
    platform: linux/arm64
    build:
      context: .
      dockerfile: Dockerfile
      # 2. Passes the variables so the Go compiler in the Dockerfile reacts correctly
      args:
        TARGETOS: linux
        TARGETARCH: arm64
    image: cost-estimation-task:latest
    container_name: cost-estimation-run-task
    depends_on:
      c3x-pricing-api:
        condition: service_healthy
    ports:
      - "22180:22180"
    environment:
      # C3X Pricing API configuration
      C3X_PRICING_API_ENDPOINT: http://c3x-pricing-api:4000
      C3X_API_KEY: ${C3X_API_KEY:-}

      # Budget limit in USD (optional)
      C3X_BUDGET_LIMIT: ${C3X_BUDGET_LIMIT:-}

      # AI Agent configuration
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AGENT_SECURITY_ENABLED: ${AGENT_SECURITY_ENABLED:-false}
      AGENT_PRICING_ENABLED: ${AGENT_PRICING_ENABLED:-false}
      AGENT_COMPLIANCE_ENABLED: ${AGENT_COMPLIANCE_ENABLED:-false}
      AGENT_FAIL_ON_CRITICAL: ${AGENT_FAIL_ON_CRITICAL:-false}

    # Command line arguments
    command:
      - "--addr"
      - "22180"
      - "--path"
      - "/runtask"
      - "--hmac-key"
      - "${HMAC_KEY:-secret123}"

    networks:
      - c3x-network
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    restart: unless-stopped

    # healthcheck:
    #   test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:22180/healthcheck"]
    #   interval: 30s
    #   timeout: 3s
    #   retries: 3
    #   start_period: 5s

  # Wormhole tunnel for exposing cost-estimation-run-task
  wormhole:
    image: docker.io/getourneau/wormhole:latest
    container_name: wormhole
    network_mode: "service:cost-estimation-run-task"
    command: ["http", "22180", "--inspect", "0.0.0.0:4040", "--headless"]
    environment:
      - WORMHOLE_RELAY_URL=wss://relay.wormhole.bar
    depends_on:
      - cost-estimation-run-task
    restart: unless-stopped

networks:
  c3x-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local

# Podman-specific notes:
# 1. The :Z suffix on volume mounts enables SELinux labeling for rootless containers
# 2. All images use fully qualified names (docker.io/library/...) for clarity
# 3. Health checks work the same as Docker Compose
# 4. Port mappings work in rootless mode (ports > 1024)
